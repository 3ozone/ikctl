version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ikctl-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobreescribir las URLs para usar los nombres de contenedor en la red Docker
      DB_URL: mysql+aiomysql://${DB_USER:-ikctl_user}:${DB_PASSWORD:-ikctl_pass123}@mariadb:3306/${DB_NAME:-ikctl_db}
      VALKEY_URL: redis://:${VALKEY_PASSWORD:-valkey_pass123}@valkey:6379/0
      SMTP_HOST: mailhog
      # GitHub OAuth — callback apunta al frontend (el navegador es quien recibe el redirect)
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3000/login/github/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      TZ: UTC
    ports:
      - "${FASTAPI_PORT:-8089}:8089"
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - ikctl-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mariadb:
    image: mariadb
    container_name: ikctl-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-ikctl_db}
      MYSQL_USER: ${DB_USER:-ikctl_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ikctl_pass123}
      MARIADB_AUTO_UPGRADE: 1
      TZ: UTC
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ikctl-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
      interval: 10s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ikctl-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_USER: ${DB_USER:-ikctl_user}
      PMA_PASSWORD: ${DB_PASSWORD:-ikctl_pass123}
      PMA_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      TZ: UTC
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - mariadb
    networks:
      - ikctl-network

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: ikctl-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --appendonly yes
      --requirepass ${VALKEY_PASSWORD:-valkey_pass123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      TZ: UTC
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    networks:
      - ikctl-network
    healthcheck:
      test: ["CMD", "valkey-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 5
      interval: 10s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ikctl-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - ikctl-network

volumes:
  mariadb_data:
    driver: local
  valkey_data:
    driver: local

networks:
  ikctl-network:
    driver: bridge
